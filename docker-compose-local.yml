version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: musicchord-db
    environment:
      POSTGRES_USER: musicchord
      POSTGRES_PASSWORD: musicchord123
      POSTGRES_DB: musicchord
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U musicchord"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
